name: Hardhat Build & Test

on:
  schedule:
    # Runs "at 7h30 am every day" (see https://crontab.guru)
    - cron: '30 7 * * *'
  push:
  workflow_dispatch:

jobs:
  hardhat_build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive
      - name: Yarn Install
        run: yarn
      - name: Hardhat Compile
        run: yarn hardhat compile
      - name: Hardhat Test
        run: yarn hardhat test
      # Build re-runs AFTER tests so regenerated ABI + typechain artifacts
      # are consistent with what callers (mymultisig.app frontend) consume.
      # Move this step before `Hardhat Test` if you want to test against
      # the published ABI shape; the current order ensures tests always
      # pass against the latest in-tree code.
      - name: Hardhat Build (ABI / typechain)
        run: yarn build
      - name: Hardhat Coverage
        run: yarn coverage
